server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: marketing-cost-api
  # T3 BOM 导入 —— U9 BOM Excel 实测 42 MB（34 万行），默认 1MB/10MB 直接被 Tomcat 拒。
  # 放宽到 200MB 留足头部余量；max-request-size 覆盖整个 multipart 请求体（含多字段开销）
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/marketing_cost?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.sanhua.marketingcost: info
  # 日志文件目录：logback-spring.xml 通过 ${LOG_DIR} 读取，兼容运维自定义路径
  file:
    path: ${LOG_PATH:./logs}

# T34: Actuator 运维端点（health/info 公开；其他端点仅 ADMIN —— 见 ActuatorSecurityConfig）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env,threaddump
  endpoint:
    health:
      # 健康详情仅登录用户可见，避免信息泄露
      show-details: when_authorized
    env:
      # /env 涉及敏感配置，默认启用但受 ActuatorSecurityConfig ADMIN 限制
      show-values: when_authorized

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXktcGxlYXNlLWNoYW5nZS1pbi1wcm9k}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# 取价路由 Strangler 双跑配置
#   mode = legacy: 仅走老 2 桶 (FIXED + LINKED)，回滚保险
#   mode = dual:   两套并行算 → diff 写 WARN（>warnThreshold）+ 返回 legacy 结果（默认）
#   mode = new:    仅走新 6 桶 Router，金标全绿后切换
cost:
  router:
    mode: ${COST_ROUTER_MODE:dual}
    dual:
      # 双跑差异告警阈值（元/件）；< 阈值不打 WARN，避免噪声
      warnThreshold: ${COST_ROUTER_DUAL_WARN_THRESHOLD:0.01}
  # Task #9：水电费是否计入材料费
  #   false（默认）= 与 Excel 见机表3 口径一致：水电独立列报，不进材料费
  #   true          = 老逻辑兜底：把 deptTotal 全部（含水电）并入材料费，便于历史报表回溯
  material:
    includeWaterPower: ${COST_MATERIAL_INCLUDE_WATER_POWER:false}
  # 联动价 parser 模式灰度（T08 配置）
  #   legacy = 只走旧 evaluateExpression（保留 [中文] 包裹兼容）
  #   dual（默认）= legacy 主、new 并跑；差异 > dual-warn-threshold 写 WARN，返回 legacy 值
  #   new    = 只走新 FormulaNormalizer + VariableRegistry 管线；失败直接抛错
  linked:
    parser:
      mode: ${COST_LINKED_PARSER_MODE:dual}
      dual-warn-threshold: ${COST_LINKED_PARSER_DUAL_WARN_THRESHOLD:0.01}
