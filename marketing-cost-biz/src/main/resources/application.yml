server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: marketing-cost-api
  # T3 BOM 导入 —— U9 BOM Excel 实测 42 MB（34 万行），默认 1MB/10MB 直接被 Tomcat 拒。
  # 放宽到 200MB 留足头部余量；max-request-size 覆盖整个 multipart 请求体（含多字段开销）
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:200MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:200MB}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # T13+：MySQL server character_set_*=latin1（docker my.cnf 默认未配 utf8mb4），
    # JDBC URL 不显式指定 charset 时新写入会被 server 当 latin1 解码再以 utf8mb4 存 → mojibake。
    # 显式 useUnicode=true&characterEncoding=utf-8 强制连接走 utf8mb4，挡住后续新数据污染。
    # （历史已 mojibake 数据由 fix_mojibake 脚本一次性修复。）
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/marketing_cost?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    hikari:
      # T19：20 → 40 配合 costRunExecutor 16 + 主同步独立事务（REQUIRES_NEW）+ Async 子查询并发
      maximum-pool-size: 40
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # 修复时间不是北京时间：docker MySQL 容器系统时区是 UTC，导致 NOW() / CURRENT_TIMESTAMP
      # 写入的 datetime 字面值比北京时间晚 8 小时。通过 connection-init-sql 让 marketing_cost
      # 应用的每个 JDBC 连接初始化时把 session 时区设成 +08:00 —— 仅影响本应用连接，
      # 不动 MySQL 全局（避免影响 docker 内其他业务库）
      connection-init-sql: "SET time_zone = '+08:00'"

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.sanhua.marketingcost: info
  # 日志文件目录：logback-spring.xml 通过 ${LOG_DIR} 读取，兼容运维自定义路径
  file:
    path: ${LOG_PATH:./logs}

monthly:
  reprice:
    # 月度调价入口开关；本地默认开启，生产可按业务单元灰度。
    enabled: ${MONTHLY_REPRICE_ENABLED:true}
    execution-backend: ${MONTHLY_REPRICE_EXECUTION_BACKEND:LOCAL_WORKER}
    # 逗号分隔；为空表示不限制业务单元。灰度期建议显式配置测试业务单元。
    allowed-business-units: ${MONTHLY_REPRICE_ALLOWED_BUSINESS_UNITS:}

# T34: Actuator 运维端点（health/info 公开；其他端点仅 ADMIN —— 见 ActuatorSecurityConfig）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env,threaddump
  endpoint:
    health:
      # 健康详情仅登录用户可见，避免信息泄露
      show-details: when_authorized
    env:
      # /env 涉及敏感配置，默认启用但受 ActuatorSecurityConfig ADMIN 限制
      show-values: when_authorized

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXktcGxlYXNlLWNoYW5nZS1pbi1wcm9k}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# V48 (T04) 起取价路径仅走 Router + 4 桶 Resolver（FIXED/LINKED/RANGE/MAKE）。
# 老 Strangler 双跑配置（cost.router.mode = legacy/dual/new）已删除：legacy 老结果都是测试期造的数据，
# 没有真实业务价值，保留双跑只是浪费 + 副作用（业务实际拿到 legacy 结果而非 v1 新功能）。
cost:
  run:
    engine:
      # 当前版本统一 CostRunEngine 已是唯一核算核心；开关保留给上线检查和异常兜底策略识别。
      enabled: ${COST_RUN_ENGINE_ENABLED:true}
    execution:
      # 默认提交通用任务；回退只需设置 COST_RUN_EXECUTION_MODE=API_SYNC，灰度名单可保留。
      mode: ${COST_RUN_EXECUTION_MODE:TASK_WORKER}
      # 逗号分隔；为空表示当前 mode 对全部请求生效。生产灰度建议先显式配置小范围名单。
      gray-business-units: ${COST_RUN_EXECUTION_GRAY_BUSINESS_UNITS:}
      gray-users: ${COST_RUN_EXECUTION_GRAY_USERS:}
  # Task #9：水电费是否计入材料费
  #   true（默认） = 与 Excel 见机表3 口径一致：水电列报，同时进入材料费基数
  #   false        = 水电独立列报，不进材料费，用于历史口径回溯
  material:
    includeWaterPower: ${COST_MATERIAL_INCLUDE_WATER_POWER:true}
  # 联动价 parser 模式灰度（T08 配置）
  #   legacy = 只走旧 evaluateExpression（保留 [中文] 包裹兼容）
  #   dual   = legacy 主、new 并跑；差异 > dual-warn-threshold 写 WARN，返回 legacy 值
  #   new（默认）= 只走新 FormulaNormalizer + VariableRegistry 管线；失败直接抛错
  # V48 业务确认老 parser 有口径问题（不做含税转换），全量切到 new；trace 弹窗不再有 legacy/diff
  linked:
    # 月度联动价与影响因素 Excel 自动绑定灰度开关
    #   true（默认） = 导入时解析影响因素 sheet、单价列公式并自动写行级绑定
    #   false        = 只导入联动价/固定价行，不自动写绑定，保留老流程可用
    excel-auto-binding:
      enabled: ${COST_LINKED_EXCEL_AUTO_BINDING_ENABLED:true}
    parser:
      mode: ${COST_LINKED_PARSER_MODE:new}
      dual-warn-threshold: ${COST_LINKED_PARSER_DUAL_WARN_THRESHOLD:0.01}
